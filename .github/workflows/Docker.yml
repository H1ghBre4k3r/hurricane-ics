name: Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/h1ghbre4k3r/hurricane-ics
  MANIFEST_BRANCH: deploy/k3s-manifests

jobs:
  publish-docker-image:
    name: Build, Publish, and Pin Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Test backend
        run: npm test

      - name: Build project
        run: npm run build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Pin Kubernetes manifest to image tag
        env:
          IMAGE_TAG: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          manifest = Path("k8s/hurricane-ics.yml")
          image_tag = os.environ["IMAGE_TAG"]
          content = manifest.read_text()
          content = content.replace(
              "image: ghcr.io/h1ghbre4k3r/hurricane-ics",
              f"image: {image_tag}",
              1,
          )
          manifest.write_text(content)
          PY

      - name: Commit pinned manifest to deploy branch
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          short_sha="${SHORT_SHA::7}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/hurricane-ics.yml
          git commit -m "Update k3s manifest for ${short_sha}"

          git branch -f "${MANIFEST_BRANCH}" HEAD
          git push --force origin "${MANIFEST_BRANCH}"

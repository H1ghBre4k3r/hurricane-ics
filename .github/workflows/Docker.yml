name: Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MANIFEST_BRANCH: deploy/k3s-manifests
  REGISTRY: ghcr.io
  IMAGE: hurricane-ics 

jobs:
  publish-docker-image:
    name: Build, Publish, and Pin Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Test backend
        run: npm test

      - name: Build project
        run: npm run build

      - name: Verify docker build inputs
        run: |
          set -euo pipefail
          test -f Dockerfile
          test -f build/index.js
          test -d frontend/build
          ls -lah build frontend/build
          echo "SHA=${{ github.sha }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        if: ${{ github.ref_name == 'main' }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Pin Kubernetes manifest to image tag
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE }}:sha-${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          manifest = Path("k8s/hurricane-ics.yml")
          image_tag = os.environ["IMAGE_TAG"]
          content = manifest.read_text()
          content = content.replace(
              "image: ghcr.io/h1ghbre4k3r/hurricane-ics",
              f"image: {image_tag}",
              1,
          )
          manifest.write_text(content)
          PY
          cat k8s/hurricane-ics.yml

      - name: Commit pinned manifest to deploy branch
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          short_sha="${SHORT_SHA::7}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${MANIFEST_BRANCH}"
          git add .
          if git diff --cached --quiet; then
            git commit --allow-empty -m "Update k3s manifest for ${short_sha}"
          else
            git commit -m "Update k3s manifest for ${short_sha}"
          fi
          git push --force origin "${MANIFEST_BRANCH}"
